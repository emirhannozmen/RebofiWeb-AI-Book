services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - rebofi-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rebofi-backend
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY} 
      - FRONTEND_URL=${FRONTEND_URL}
      - UPLOAD_DIR=./uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rebofi-network
    restart: always

  frontend:
    build: ./frontend
    container_name: rebofi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rebofi-network
    restart: always

volumes:
  postgres_data:

networks:
  rebofi-network:
    driver: bridge